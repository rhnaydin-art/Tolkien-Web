        function initSupabase() {
            // Öncelik kodun en üstündeki sabit değişkenlerde, yoksa tarayıcı belleğine bak
            const url = SUPABASE_URL || localStorage.getItem('sb_url');
            const key = SUPABASE_KEY || localStorage.getItem('sb_key');
            const badge = document.getElementById('db-status-badge');
            
            // Login Modal arayüzünü Supabase durumuna göre uyarla
            const emailField = document.getElementById('email-field-container');
            const passLabel = document.getElementById('pass-label');
            const passInput = document.getElementById('adminPassword');
            const loginSubtitle = document.getElementById('login-modal-subtitle');

            if (url && key) {
                try {
                    supabaseClient = supabase.createClient(url, key);
                    badge.textContent = "Supabase Canlı";
                    badge.className = "hidden sm:inline-block px-3 py-1 rounded text-[10px] tracking-widest border border-emerald-500/30 text-emerald-400 bg-emerald-950/20";
                    
                    // Supabase aktifse güvenli E-posta + Şifre moduna geç
                    emailField.classList.remove('hidden');
                    passLabel.classList.remove('hidden');
                    passInput.placeholder = "Yönetici şifreniz";
                    passInput.classList.remove('text-center', 'tracking-widest');
                    loginSubtitle.textContent = "Supabase Güvenli Oturumu";
                    
                    // Supabase kilitliyse yönetim panelindeki hassas ayar butonunu gizle
                    const sbBtn = document.getElementById('admin-supabase-btn');
                    if (sbBtn && SUPABASE_URL) sbBtn.classList.add('hidden');
                    
                    return true;
                } catch (e) { console.error(e); }
            }
            
            badge.textContent = "Lokal Bellek";
            badge.className = "hidden sm:inline-block px-3 py-1 rounded text-[10px] tracking-widest border border-red-500/30 text-red-400 bg-red-950/20";
            
            // Lokal bellek modundaysa klasik test şifresi moduna geri dön
            emailField.classList.add('hidden');
            passLabel.classList.add('hidden');
            passInput.placeholder = "Parolayı girin (tolkien)";
            passInput.classList.add('text-center', 'tracking-widest');
            loginSubtitle.textContent = "Giriş izni gereklidir";
            
            // Sabit bilgi yoksa ayar butonunu göster
            const sbBtn = document.getElementById('admin-supabase-btn');
            if (sbBtn) sbBtn.classList.remove('hidden');
            
            supabaseClient = null;
            return false;
        }
